name: Sync ch-saas tenants
on:
  schedule:
    - cron: "30 1 * * *"
  workflow_dispatch:
concurrency:
  group: ${{ github.repository }}-${{ github.head_ref || github.ref_name }}-upptime
  cancel-in-progress: false
jobs:
  sync:
    name: Sync tenant list
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: ${{ github.head_ref || github.ref_name }}
          token: ${{ secrets.GH_PAT || github.token }}
      - name: Checkout ch-infrastructure
        uses: actions/checkout@v6
        with:
          repository: iCloudHospital/ch-infrastructure
          token: ${{ secrets.GH_PAT }}
          path: ch-infra
          sparse-checkout: k8s/argocd/apps/saas/prd
      - name: Sync .upptimerc.yml
        run: |
          pip install pyyaml
          python scripts/sync-saas-tenants.py ch-infra
      - name: Commit if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          rm -rf ch-infra
          git add .upptimerc.yml
          git diff --cached --quiet || git commit -m ":recycle: Sync ch-saas tenant monitors [skip ci]"
          git push
